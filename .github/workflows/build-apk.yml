name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4' # Uses stable Gradle version compatible with Android build

    - name: Restore Keystore & Configuration
      run: |
        # Decode the debug keystore from base64 if it exists
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug keystore..."
          base64 -d debug.keystore.base64 > debug.keystore
        else
          echo "No debug.keystore.base64 found, skipping decode."
        fi
        
        # Create .env file from example if missing to satisfy secrets plugin configuration
        if [ -f .env.example ] && [ ! -f .env ]; then
          echo "Creating .env from .env.example..."
          cp .env.example .env
        fi

    - name: Build Debug APK
      run: gradle :app:assembleDebug --stacktrace

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
